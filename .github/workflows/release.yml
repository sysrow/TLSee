name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X 'github.com/sysrow/tlsee/internal/cli.version=${version}'"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"; goarch="${target#*/}"
            bin="tlsee"; [ "$goos" = windows ] && bin="tlsee.exe"
            echo "building ${goos}/${goarch}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" -o "$bin" .
            name="tlsee_${version}_${goos}_${goarch}"
            if [ "$goos" = windows ]; then
              zip -qj "dist/${name}.zip" "$bin" README.md LICENSE
            else
              tar czf "dist/${name}.tar.gz" "$bin" README.md LICENSE
            fi
            rm -f "$bin"
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
